<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoSync</title>
    <link rel="icon" href="static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/MaterialDesign-Webfont/7.4.47/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="static/style.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script>
        // 预加载关键资源
        document.addEventListener("DOMContentLoaded", function() {
            const preloads = [
                { href: 'feed.json', as: 'fetch', type: 'application/json' },
                { href: 'config/labels.yml', as: 'fetch', type: 'text/yaml' },
                { href: 'config/github.yml', as: 'fetch', type: 'text/yaml' }
            ];
            
            preloads.forEach(resource => {
                const link = document.createElement('link');
                link.rel = 'preload';
                link.href = resource.href;
                link.as = resource.as;
                if (resource.type) link.type = resource.type;
                document.head.appendChild(link);
            });
        });
    </script>
</head>
<body>
    <header class="header">
        <div class="header-main">
            <div class="site-title">
                <i class="mdi mdi-rss-box"></i>
                <span>ChronoSync</span>
            </div>
            <nav class="nav-items">
                <!-- 动态生成导航项 -->
            </nav>
            <div class="update-time">
                <i class="mdi mdi-clock-outline"></i>
                <span id="update-time">加载中...</span>
            </div>
        </div>
    </header>

    <nav class="mobile-nav">
        <!-- 动态生成移动端导航项 -->
    </nav>
    <main class="articles" id="articles">
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在加载...</div>
        </div>
    </main>
    
    <!-- 引入JavaScript文件 -->
    <script src="static/js/app.js"></script>
</body>
</html>
